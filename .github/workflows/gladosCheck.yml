name: auto check

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]
    paths-ignore:
      - 'README.md'
      - 'imgs/**'
  schedule:
    - cron: '0 4,10 * * *'

jobs:
  build:
    name: glados/railgun checkin
    runs-on: ubuntu-latest
      
    permissions:
      contents: read
      actions: write

    strategy:
      matrix:
        python-version: [3.13]

    # 这里加入全局环境变量，强制后续所有第三方 actions 兼容 Node.js 24 运行环境
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - name: Checkout Code
      uses: actions/checkout@v6

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}

    - name: Repair runner DNS
      run: |
        sudo rm -f /etc/resolv.conf
        printf 'nameserver 1.1.1.1\nnameserver 8.8.8.8\noptions timeout:2 attempts:2\n' | sudo tee /etc/resolv.conf
        cat /etc/resolv.conf

    - name: Resolve GLaDOS domains via DoH
      env:
        GLADOS_DOMAINS: glados.cloud,glados.space,glados.rocks
      run: |
        python - <<'PY'
        import json
        import os
        import socket
        import subprocess
        import sys
        import urllib.parse
        import urllib.request

        domains_env = os.environ.get("GLADOS_DOMAINS", "").strip()
        domains = [d.strip() for d in domains_env.split(",") if d.strip()] or ["glados.cloud"]
        resolvers = [
            "https://dns.google/resolve?name={domain}&type=A",
            "https://cloudflare-dns.com/dns-query?name={domain}&type=A",
        ]
        fallback_ips = {
            "glados.cloud": ["104.21.90.139", "172.67.200.254"],
          "glados.space": ["104.21.63.33", "172.67.169.110"],
          "glados.rocks": ["54.238.39.37", "54.168.191.105", "13.159.252.86"],
            "railgun.info": ["104.21.39.178", "172.67.171.40"],
        }

        def resolve_from_system(domain: str):
            try:
                infos = socket.getaddrinfo(domain, 443, type=socket.SOCK_STREAM)
                return sorted({info[4][0] for info in infos if info[4]})
            except Exception as exc:
                print(f"System lookup failed for {domain}: {exc}", file=sys.stderr)
                return []

        def resolve_from_doh(domain: str):
            for template in resolvers:
                url = template.format(domain=urllib.parse.quote(domain, safe=""))
                req = urllib.request.Request(url, headers={"accept": "application/dns-json"})
                try:
                    with urllib.request.urlopen(req, timeout=15) as resp:
                        payload = json.load(resp)
                    ips = [
                        answer["data"]
                        for answer in payload.get("Answer", [])
                        if answer.get("type") == 1 and answer.get("data")
                    ]
                    if ips:
                        return ips
                except Exception as exc:
                    print(f"DoH lookup failed for {domain} via {url}: {exc}", file=sys.stderr)
            return []

        host_lines = []
        for domain in domains:
            ips = resolve_from_system(domain)
            source = "system"
            if not ips:
                ips = resolve_from_doh(domain)
                source = "doh"
            if not ips:
                ips = fallback_ips.get(domain, [])
                source = "fallback"
            if not ips:
                print(f"Failed to resolve {domain} via all DoH resolvers", file=sys.stderr)
                sys.exit(1)
            ip = ips[0]
            print(f"Resolved {domain} via {source} -> {ip}")
            host_lines.append(f"{ip} {domain}")

        hosts_payload = "\n".join(host_lines) + "\n"
        subprocess.run(
            ["sudo", "tee", "-a", "/etc/hosts"],
            input=hosts_payload,
            text=True,
            check=True,
        )
        PY

    # 安装 python 库
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests
        pip install pypushdeer

    # 执行 签到脚本
    - name: Running checkin
      run: |
        python checkin.py
      env:
        PUSHDEER_SENDKEY: ${{ secrets.PUSHDEER_SENDKEY }}
        GLADOS_COOKIES: ${{ secrets.GLADOS_COOKIES }}
        GLADOS_EXCHANGE_PLAN: ${{ secrets.GLADOS_EXCHANGE_PLAN }}
        GLADOS_VERBOSE: ${{ secrets.GLADOS_VERBOSE }}
        GLADOS_DOMAINS: glados.cloud,glados.space,glados.rocks

    - name: Keep alive
      uses: liskin/gh-workflow-keepalive@v1 
        
    - name: Delete workflow runs
      uses: Mattraks/delete-workflow-runs@v2
      with:
        token: ${{ github.token }}
        repository: ${{ github.repository }}
        retain_days: 7
        keep_minimum_runs: 7
        delete_run_by_conclusion_pattern: success
