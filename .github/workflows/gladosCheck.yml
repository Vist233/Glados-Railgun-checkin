name: auto check

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]
    paths-ignore:
      - 'README.md'
      - 'imgs/**'
  schedule:
    - cron: '0 4,10 * * *'

jobs:
  build:
    name: glados/railgun checkin
    runs-on: ubuntu-latest
      
    permissions:
      contents: read
      actions: write

    strategy:
      matrix:
        python-version: [3.13]

    # 这里加入全局环境变量，强制后续所有第三方 actions 兼容 Node.js 24 运行环境
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - name: Checkout Code
      uses: actions/checkout@v6

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}

    # 安装 python 库
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests
        pip install pypushdeer

    - name: Start checkin proxy
      env:
        GLADOS_PROXY_CONFIG: ${{ secrets.GLADOS_PROXY_CONFIG }}
      run: |
        test -n "$GLADOS_PROXY_CONFIG"
        mkdir -p /tmp/mihomo
        printf '%s' "$GLADOS_PROXY_CONFIG" | base64 --decode > /tmp/mihomo/config.yaml
        curl -fsSL https://github.com/MetaCubeX/mihomo/releases/download/v1.19.28/mihomo-linux-amd64-v1.19.28.gz | gzip -d > /tmp/mihomo/mihomo
        chmod +x /tmp/mihomo/mihomo
        /tmp/mihomo/mihomo -d /tmp/mihomo -f /tmp/mihomo/config.yaml > /tmp/mihomo/mihomo.log 2>&1 &
        for attempt in {1..15}; do
          if curl -fsS --proxy http://127.0.0.1:7890 https://www.cloudflare.com/cdn-cgi/trace > /dev/null; then
            echo "Checkin proxy is ready"
            exit 0
          fi
          sleep 2
        done
        exit 1

    # 执行 签到脚本
    - name: Running checkin
      run: |
        python checkin.py
      env:
        PUSHDEER_SENDKEY: ${{ secrets.PUSHDEER_SENDKEY }}
        GLADOS_COOKIES: ${{ secrets.GLADOS_COOKIES }}
        GLADOS_EXCHANGE_PLAN: ${{ secrets.GLADOS_EXCHANGE_PLAN }}
        GLADOS_VERBOSE: ${{ secrets.GLADOS_VERBOSE }}
        GLADOS_DOMAINS: glados.cloud
        HTTP_PROXY: http://127.0.0.1:7890
        HTTPS_PROXY: http://127.0.0.1:7890

    - name: Keep alive
      uses: liskin/gh-workflow-keepalive@v1 
        
    - name: Delete workflow runs
      uses: Mattraks/delete-workflow-runs@v2
      with:
        token: ${{ github.token }}
        repository: ${{ github.repository }}
        retain_days: 7
        keep_minimum_runs: 7
        delete_run_by_conclusion_pattern: success
